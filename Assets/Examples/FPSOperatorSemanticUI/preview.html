<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FPS Operator Semantic UI Preview</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px;
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(110, 168, 254, 0.16), transparent 38%),
        linear-gradient(180deg, #0d1117 0%, #06080d 100%);
      color: #f3f6fb;
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background: rgba(13, 17, 23, 0.82);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }
    .meta {
      margin: 0 0 24px;
      color: rgba(243, 246, 251, 0.72);
      font-size: 14px;
    }
    .preview-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }
    .preview-link {
      display: block;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: inherit;
      text-decoration: none;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }
    .preview-link:hover {
      transform: translateY(-1px);
      border-color: rgba(110, 168, 254, 0.65);
      background: rgba(110, 168, 254, 0.12);
    }
    .preview-empty {
      color: rgba(243, 246, 251, 0.52);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>FPS Operator Semantic UI</h1>
    <p class="meta">Open a page below to inspect the authored HTML preview.</p>
    <div class="preview-list">
    <a class="preview-link" href="source/pages/combat-hud.html">Combat HUD</a>
    </div>
  </div>
</body>
</html>
